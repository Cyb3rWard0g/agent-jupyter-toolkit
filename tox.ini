[tox]
envlist = toolkit, mcp, ruff, black

# ── agent-jupyter-toolkit tests ─────────────────────────
[testenv:toolkit]
description = Run agent-jupyter-toolkit tests
changedir = packages/agent-jupyter-toolkit
deps =
    pytest
    pytest-asyncio
    anyio
    ipykernel
    jupyter_client
    pandas
    pyarrow
    nbformat
commands =
    pytest {posargs}

# ── mcp-jupyter-notebook tests ──────────────────────────
[testenv:mcp]
description = Run mcp-jupyter-notebook tests
changedir = packages/mcp-jupyter-notebook
deps =
    pytest
    pytest-asyncio
    mcp
    jupyter_client
    pandas
    pyarrow
    nbformat
commands =
    pytest {posargs}

# ── lint ────────────────────────────────────────────────
[testenv:ruff]
description = Ruff lint (all packages)
skip_install = true
deps = ruff>=0.6.0
commands = ruff check packages/

[testenv:black]
description = Black formatting check (all packages)
skip_install = true
deps = black
commands = black --check packages/

[flake8]
max-line-length = 100
exclude = __pycache__,.tox,.git,build,dist,.venv,repos
