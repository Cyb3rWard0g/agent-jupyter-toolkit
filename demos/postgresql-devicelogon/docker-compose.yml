services:
  jupyter:
    build: ./jupyter/
    container_name: devicelogon-jupyter
    restart: unless-stopped
    init: true
    ports:
      - "127.0.0.1:8888:8888"
    environment:
      JUPYTER_TOKEN: ${JUPYTER_TOKEN:-mcp-dev-token}
      JUPYTER_ENABLE_LAB: "yes"
      # Kernel-side DSN so agent-data-toolkit PostgresClient can connect
      PG_DSN: ${PG_DSN:-postgresql://postgres:postgres@postgres:5432/devicelogon?sslmode=disable}
    volumes:
      - ./notebooks:/home/jovyan/work
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      start-notebook.py
      --IdentityProvider.token=${JUPYTER_TOKEN:-mcp-dev-token}
      --ServerApp.allow_remote_access=True
      --ServerApp.ip=0.0.0.0
      --ServerApp.root_dir=/home/jovyan/work
      --ServerApp.trust_xheaders=True

  postgres:
    image: postgres:16
    container_name: devicelogon-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-devicelogon}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d:ro
      - ./data:/data:ro
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-postgres}", "-d", "${POSTGRES_DB:-devicelogon}"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
