[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"

[project]
name = "mcp-jupyter-notebook"
dynamic = ["version"]
description = "An MCP server for AI agents to interact with Jupyter notebooks"
readme = "README.md"
license = { file = "LICENSE" }
authors = [
  { name = "Roberto Rodriguez", email = "9653181+Cyb3rWard0g@users.noreply.github.com" }
]
requires-python = ">=3.11,<3.14"
classifiers = [
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "License :: OSI Approved :: Apache Software License",
  "Operating System :: OS Independent",
]
keywords = ["Jupyter", "MCP", "agents", "notebooks", "model-context-protocol"]

dependencies = [
  "agent-jupyter-toolkit",
  "mcp>=1.26.0",
]

[project.scripts]
mcp-jupyter-notebook = "mcp_jupyter_notebook:main"

[project.optional-dependencies]
dataframe = [
  "agent-jupyter-toolkit[dataframe]",
]

postgres = [
  "agent-data-toolkit[postgresql]",
]

# Alias for convenience (same as the `postgres` extra)
postgresql = [
  "agent-data-toolkit[postgresql]",
]

dev = [
  "pytest>=9.0.2",
  "pytest-asyncio>=1.3.0",
  "ruff>=0.14.13",
  "build",
  "twine",
]

[project.urls]
Homepage = "https://github.com/Cyb3rWard0g/agent-jupyter-toolkit"
Repository = "https://github.com/Cyb3rWard0g/agent-jupyter-toolkit"
Issues = "https://github.com/Cyb3rWard0g/agent-jupyter-toolkit/issues"

[tool.hatch.version]
source = "vcs"
raw-options.root = "../.."

[tool.hatch.build.targets.wheel]
packages = ["src/mcp_jupyter_notebook"]

[tool.uv.sources]
agent-jupyter-toolkit = { workspace = true }

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-ra"
pythonpath = ["src"]
asyncio_default_fixture_loop_scope = "function"
norecursedirs = [".venv"]
